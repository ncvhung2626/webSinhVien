<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dang nhap - He thong Quan ly Sinh vien</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
  :root { --primary: #4e73df; --accent: #4e73df; --bg: #f0f4f8; --text: #1a2e44; --muted: #6b7f96; --border: #dde4ed; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: linear-gradient(180deg, #4e73df 0%, #224abe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-wrapper { display: flex; width: 900px; max-width: 95vw; min-height: 540px; border-radius: 24px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.25); animation: slideUp 0.6s cubic-bezier(.16,1,.3,1); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .left-panel { width: 45%; background: linear-gradient(145deg, #4e73df 0%, #224abe 100%); padding: 50px 40px; display: flex; flex-direction: column; justify-content: space-between; }
  .brand-icon { width: 56px; height: 56px; background: var(--accent); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .brand-icon i { color: white; font-size: 24px; }
  .brand h1 { color: white; font-size: 28px; line-height: 1.3; margin-bottom: 12px; font-weight: 700; }
  .brand p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; }
  .feature-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; color: rgba(255,255,255,0.8); font-size: 13.5px; }
  .feature-item .dot { width: 8px; height: 8px; background: white; border-radius: 50%; flex-shrink: 0; }
  .right-panel { width: 55%; background: white; padding: 50px 48px; display: flex; flex-direction: column; justify-content: center; }
  .right-panel h2 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
  .role-tabs { display: flex; gap: 8px; margin-bottom: 28px; background: var(--bg); padding: 5px; border-radius: 12px; }
  .role-tab { flex: 1; padding: 10px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Be Vietnam Pro', sans-serif; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .role-tab.active { background: white; color: #4e73df; box-shadow: 0 2px 10px rgba(78,115,223,0.15); font-weight: 600; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; display: block; }
  .form-control { border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px 12px 42px; font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; color: var(--text); width: 100%; background: var(--bg); transition: all 0.2s; }
  .form-control:focus { border-color: #4e73df; background: white; box-shadow: 0 0 0 4px rgba(78,115,223,0.1); outline: none; }
  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; }
  .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted); font-size: 14px; }
  .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #4e73df, #224abe); color: white; border: none; border-radius: 12px; font-family: 'Be Vietnam Pro', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.25s; margin-top: 8px; }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(78,115,223,0.4); }
  .alert-msg { padding: 12px 16px; border-radius: 10px; font-size: 13.5px; margin-top: 16px; display: none; }
  .alert-error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
  .alert-success { background: #f0fff4; color: #1e8449; border: 1px solid #c3e6cb; }
  .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 768px) { .login-wrapper { flex-direction: column; } .left-panel, .right-panel { width: 100%; padding: 36px 28px; } }
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="left-panel">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>He thong Quan ly Sinh vien</h1>
      <p>Nen tang quan ly hoc tap, diem danh va ren luyen toan dien</p>
    </div>
    <div class="features">
      <div class="feature-item"><span class="dot"></span> Diem danh thong minh bang QR Code</div>
      <div class="feature-item"><span class="dot"></span> Quan ly bai tap & nop bai truc tuyen</div>
      <div class="feature-item"><span class="dot"></span> Theo doi diem hoc phan & ren luyen</div>
      <div class="feature-item"><span class="dot"></span> Thong bao tu dong qua Email</div>
    </div>
  </div>
  <div class="right-panel">
    <h2>Dang nhap</h2>
    <p class="subtitle">Chao mung ban quay lai he thong</p>
    <div class="role-tabs">
      <button class="role-tab active" id="tab-sv" onclick="chonVaiTro('sinh_vien')">
        <i class="fas fa-user-graduate"></i> Sinh vien
      </button>
      <button class="role-tab" id="tab-gv" onclick="chonVaiTro('giang_vien')">
        <i class="fas fa-chalkboard-teacher"></i> Giang vien
      </button>
    </div>
    <form id="loginForm" onsubmit="dangNhap(event)">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="email" class="form-control" placeholder="email@example.com" required>
      </div>
      <label class="form-label">Mat khau</label>
      <div class="input-wrap" style="margin-bottom:0">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="matKhau" class="form-control" placeholder="••••••••" required>
        <i class="fas fa-eye toggle-pw" id="togglePw" onclick="togglePassword()"></i>
      </div>
      <div class="alert-msg alert-error" id="errorMsg"></div>
      <div class="alert-msg alert-success" id="successMsg"></div>
      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Dang nhap</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    <div style="text-align:center; margin-top:20px;">
      <a href="/admin-panel/login_admin.html" style="font-size:12px; color:var(--muted); text-decoration:none;">
        <i class="fas fa-user-shield"></i> Đăng nhập Quản trị viên
      </a>
    </div>
  </div>
</div>
<script>
  const API_BASE = 'http://localhost:3000/api';
  let vaiTro = 'sinh_vien';

  function chonVaiTro(role) {
    vaiTro = role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(role === 'sinh_vien' ? 'tab-sv' : 'tab-gv').classList.add('active');
  }

  function togglePassword() {
    const pw = document.getElementById('matKhau');
    const icon = document.getElementById('togglePw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    icon.className = pw.type === 'password' ? 'fas fa-eye toggle-pw' : 'fas fa-eye-slash toggle-pw';
  }

  async function dangNhap(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const matKhau = document.getElementById('matKhau').value;
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, mat_khau: matKhau })
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('errorMsg').textContent = data.message || 'Email hoac mat khau khong dung';
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('vaiTro', data.vaiTro);
      localStorage.setItem('profileId', data.profileId);
      localStorage.setItem('hoTen', data.hoTen);
      document.getElementById('successMsg').textContent = 'Dang nhap thanh cong! Xin chao ' + data.hoTen;
      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => {
        // ✅ Đường dẫn đúng theo cấu trúc thư mục
        if (data.vaiTro === 'giang_vien') {
          window.location.href = 'giang-vien/dashboard_giang_vien.html';
        } else {
          window.location.href = 'Sinh-vien/dashboard_sinh_vien.html';
        }
      }, 800);
    } catch (err) {
      document.getElementById('errorMsg').textContent = 'Khong the ket noi toi may chu';
      document.getElementById('errorMsg').style.display = 'block';
    } finally {
      document.getElementById('btnText').style.display = 'block';
      document.getElementById('spinner').style.display = 'none';
    }
  }
</script>
</body>
</html>
